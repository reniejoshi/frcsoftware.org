name: Format

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  spotless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v6
        with:
          distribution: 'temurin'
          java-version: 25

      - run: ./gradlew spotlessCheck
