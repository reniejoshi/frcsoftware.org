# [story]
name: Story
description: Create a small story task.
title: "[Story] "
labels: ["Story"]
body:
  - type: textarea
    id: description
    attributes:
      label: Story Description
      description: Specific task (e.g., Tune PID gains for intake).
    validations:
      required: true
  - type: input
    id: estimate
    attributes:
      label: Time Estimate
      description: Max 2 days (e.g., "1-2 hours").
  - type: input
    id: deadline
    attributes:
      label: Deadline
      description: Date that this task should be completed by.
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How to verify completion (e.g., "Unit tests pass, simulation works").
  - type: textarea
    id: implementation_notes
    attributes:
      label: Implementation Notes
      description: Code changes, tests, or steps needed.
  - type: textarea
    id: related_links
    attributes:
      label: Related Links
      description: Links to relevant code files, PRs, or docs.
# [/story]